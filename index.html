<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TikTok · Ray-Ban Display</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  width:100%;min-height:100vh;
  background:#0e0507;
  display:flex;align-items:center;justify-content:center;
  font-family:'Inter',sans-serif;
  overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 100% 70% at 50% 10%,#3a0912 0%,#150508 55%,#080204 100%);
  z-index:0;
}
.hud{
  position:relative;z-index:1;
  width:600px;height:600px;
  background:#111;
  border-radius:56px;
  overflow:hidden;
  box-shadow:0 0 0 1.5px rgba(255,255,255,.08),0 0 60px rgba(180,10,40,.2),0 30px 80px rgba(0,0,0,.85);
}
#mainvid{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  background:#000;
  z-index:1;
  display:block;
}
#covimg{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  z-index:2;
  background:#111;
  transition:opacity .35s;
}
#slideblack{
  position:absolute;inset:0;z-index:3;
  background:#000;opacity:0;pointer-events:none;
}
.vignette{
  position:absolute;inset:0;z-index:5;pointer-events:none;
  background:linear-gradient(to bottom,
    rgba(0,0,0,.82) 0%,rgba(0,0,0,0) 22%,
    rgba(0,0,0,0) 58%,rgba(0,0,0,.85) 100%);
  border-radius:56px;
}
.tapzone{position:absolute;inset:0;z-index:8;cursor:pointer;border-radius:56px;}

/* buffering spinner */
.spin{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:36px;height:36px;
  border:3px solid rgba(255,255,255,.18);
  border-top-color:rgba(255,255,255,.75);
  border-radius:50%;
  animation:rotate .7s linear infinite;
  z-index:6;display:none;
}
.buffering .spin{display:block;}
@keyframes rotate{to{transform:translate(-50%,-50%) rotate(360deg)}}

/* tabs */
.tabs{
  position:absolute;top:26px;left:0;right:0;
  display:flex;justify-content:center;gap:28px;
  z-index:10;pointer-events:all;
}
.tab{
  font-size:14px;font-weight:600;
  color:rgba(255,255,255,.32);
  cursor:pointer;user-select:none;
  padding-bottom:5px;border-bottom:2px solid transparent;
  transition:color .2s,border-color .2s;
}
.tab.on{color:#fff;border-bottom-color:#fff;}

/* caption top */
.cap-top{
  position:absolute;top:68px;left:0;right:0;
  text-align:center;z-index:10;padding:0 54px;pointer-events:none;
}
.cap-top p{
  font-size:17px;font-weight:500;
  color:rgba(255,255,255,.93);line-height:1.45;
  text-shadow:0 2px 16px rgba(0,0,0,1),0 0 30px rgba(0,0,0,.8);
}

/* right actions */
.actions{
  position:absolute;right:14px;bottom:108px;
  z-index:10;display:flex;flex-direction:column;
  align-items:center;gap:16px;pointer-events:all;
}
.abtn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;user-select:none;}
.aico{
  width:44px;height:44px;border-radius:50%;
  border:2px solid rgba(255,255,255,.72);
  background:rgba(0,0,0,.38);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  transition:transform .14s,background .14s;
}
.abtn:active .aico{transform:scale(.86);}
.abtn.liked .aico{border-color:#ff2d55;background:rgba(255,45,85,.28);}
.acnt{font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.9);}

/* bottom bar */
.botbar{
  position:absolute;bottom:0;left:0;right:0;
  z-index:10;padding:0 20px 18px;pointer-events:none;
}
.uname{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px;text-shadow:0 1px 8px rgba(0,0,0,.9);}
.subtitle{
  font-size:15px;font-weight:600;font-style:italic;
  color:#ffe566;line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  text-shadow:0 1px 8px rgba(0,0,0,1);margin-bottom:8px;
}
.mrow{display:flex;align-items:center;gap:7px;margin-bottom:9px;}
.disc{
  width:22px;height:22px;border-radius:50%;
  background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.32);
  display:flex;align-items:center;justify-content:center;font-size:10px;
  animation:rotate 3s linear infinite;flex-shrink:0;
}
.mname{font-size:12px;color:rgba(255,255,255,.58);text-shadow:0 1px 6px rgba(0,0,0,.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:270px;}
.prog{height:2px;background:rgba(255,255,255,.16);border-radius:2px;overflow:hidden;}
.progf{height:100%;background:rgba(255,255,255,.78);border-radius:2px;width:0%;}

/* dots */
.dots{
  position:absolute;bottom:10px;left:0;right:0;
  display:flex;justify-content:center;gap:6px;z-index:10;pointer-events:none;
  flex-wrap:wrap;max-width:200px;margin:0 auto;
}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .2s,transform .2s;}
.dot.on{background:rgba(255,255,255,.82);transform:scale(1.5);}

/* heart */
.heart{
  position:absolute;left:50%;top:45%;
  transform:translate(-50%,-50%) scale(0);
  font-size:86px;pointer-events:none;z-index:50;
  animation:hpop .65s cubic-bezier(.17,.89,.32,1.28) forwards;
}
@keyframes hpop{
  0%{transform:translate(-50%,-55%) scale(0);opacity:1}
  45%{transform:translate(-50%,-55%) scale(1.2);opacity:1}
  100%{transform:translate(-50%,-72%) scale(.7);opacity:0}
}

/* swipe fx */
.sfx{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  font-size:44px;color:rgba(255,255,255,0);pointer-events:none;z-index:20;
}
.sfx.go{animation:sfxani .45s forwards;}
@keyframes sfxani{0%{color:rgba(255,255,255,0)}25%{color:rgba(255,255,255,.65)}100%{color:rgba(255,255,255,0)}}

/* loading screen */
.loadscr{
  position:absolute;inset:0;background:rgba(0,0,0,.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;z-index:40;border-radius:56px;transition:opacity .4s;
}
.loadscr.gone{opacity:0;pointer-events:none;}
.lspin{width:38px;height:38px;border:3px solid rgba(255,255,255,.15);border-top-color:#fff;border-radius:50%;animation:rotate .75s linear infinite;}
.ltxt{color:rgba(255,255,255,.45);font-size:11px;letter-spacing:.1em;text-transform:uppercase;}
.lstatus{color:rgba(255,255,255,.28);font-size:10px;}

/* toast */
.toast{
  position:fixed;bottom:36px;left:50%;transform:translateX(-50%);
  background:rgba(8,8,8,.85);color:rgba(255,255,255,.88);
  font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  padding:8px 20px;border-radius:24px;border:1px solid rgba(255,255,255,.1);
  pointer-events:none;z-index:999;opacity:0;transition:opacity .25s;white-space:nowrap;
}
.toast.show{opacity:1;}

/* desktop guide */
.guide{
  position:fixed;right:max(20px,calc(50% - 420px));top:50%;transform:translateY(-50%);
  width:175px;color:rgba(255,255,255,.28);font-size:10px;line-height:1.9;z-index:2;
}
.guide h4{color:rgba(255,255,255,.52);font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
.guide .r{display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.05);padding:2px 0;}
.guide .k{color:rgba(255,255,255,.68);}
.note{margin-top:10px;color:rgba(255,255,255,.16);font-size:9px;line-height:1.7;}
@media(max-width:860px){.guide{display:none;}}
@media(max-width:620px){
  .hud{width:100vw;height:100vw;border-radius:0;}
  .vignette,.tapzone,.loadscr{border-radius:0;}
}
</style>
</head>
<body>

<div class="hud" id="hud">

  <div class="vignette"></div>
  <div class="tapzone" id="tz"></div>
  <div class="sfx" id="sfx">↑</div>

    <div class="tab on" data-i="1">For You</div>
    <div class="tab"    data-i="2">LIVE</div>
  </div>

  <div class="cap-top"><p id="captop">Loading…</p></div>

  <div class="actions">
    <div class="abtn" id="likebtn" onclick="doLike()">
      <div class="aico" id="likeico">🤍</div>
      <div class="acnt" id="likenum">—</div>

    <div class="prog"><div class="progf" id="pf"></div></div>
  </div>

  <div class="dots" id="dots"></div>

  <div class="loadscr" id="loadscr">
    <div class="lspin"></div>
    <div class="ltxt">Loading feed…</div>
    <div class="lstatus" id="lstatus">Fetching videos</div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<div class="guide">
  <h4>Controls</h4>
  <div class="r"><span class="k">↑ / W</span><span>Prev</span></div>
  <div class="r"><span class="k">↓ / S</span><span>Next</span></div>
  <div class="r"><span class="k">← →</span><span>Tab</span></div>
  <div class="r"><span class="k">Space</span><span>Pause</span></div>
  <div class="r"><span class="k">L</span><span>Like ❤️</span></div>
  <div class="r"><span class="k">M</span><span>Mute</span></div>

  <div class="note">Meta Ray-Ban Display<br>600×600 · 20° FOV<br>#000 = transparent on lens<br>Infinite scroll enabled</div>
</div>

  setTimeout(hideLoader, 600);
}

// Append more items (infinite scroll)
async function appendMore(){
  if(fetchingMore) return;
  fetchingMore = true;
  setStatus('Loading more…');

  // Use Claude to generate fresh captions for next batch
  let extras;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:'You generate TikTok-style short video metadata. Return ONLY a raw JSON array, no markdown, no explanation.',
        messages:[{role:'user',content:`Generate 10 TikTok reel objects with these fields:
author (@ handle), desc (caption ≤55 chars with emoji), sub (italic subtitle ≤50 chars),
music (song name), l (like count like "2.3M"), c (comment count like "18K"), s (share count like "94K").
Make them feel like real viral TikToks: funny, relatable, travel, food, dance, nature themes.
Return raw JSON array only.`}]
      })
    });
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const match = text.match(/\[[\s\S]*\]/);
    if(match) extras = JSON.parse(match[0]);
  } catch(e){ extras = null; }

  // Merge Claude captions with shuffled videos from pool
  const vids = shuffle(VIDEO_POOL);
  const newItems = vids.map((v,i)=>{
    const meta = extras && extras[i] ? extras[i] : null;
    return {
      src:   v.src,
      cover: v.cover,
      author: meta ? meta.author : v.author,
      desc:   meta ? meta.desc   : v.desc,
      sub:    meta ? meta.sub    : v.sub,
      music:  meta ? meta.music  : v.music,
      l:      meta ? meta.l      : v.l,
      c:      meta ? meta.c      : v.c,
      s:      meta ? meta.s      : v.s,
    };
  });

  feed = [...feed, ...newItems];
  buildDots();
  fetchingMore = false;
  setStatus('More loaded!');
}

// ─────────────────────────────────────────────────────────────
// PLAYBACK — single <video> src-swap, guaranteed play
// ─────────────────────────────────────────────────────────────
function activate(index){
  if(busy) return;
  busy = true;

  const v = feed[index];
  if(!v){ busy=false; return; }

  // show cover instantly
  covimg.src = v.cover || '';
  covimg.style.opacity = '1';
  covimg.style.transition = 'none';

  // black flash
  slideblk.style.transition='none';
  slideblk.style.opacity='1';
  hud.classList.add('buffering');

  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      // swap video src
      vid.pause();
      vid.src = v.src;
      vid.muted = muted;
      vid.currentTime = 0;

      // fade out black
      slideblk.style.transition='opacity .15s';
      slideblk.style.opacity='0';

      updateHUD(v);
      updDots();
      pfill.style.width='0%';
      cancelAnimationFrame(progRaf);

      vid.load();
      const playPromise = vid.play();
      if(playPromise){
        playPromise.then(()=>{
          hud.classList.remove('buffering');
          busy=false;
          startProgRaf();
          // fade cover out once video playing
          setTimeout(()=>{
            covimg.style.transition='opacity .4s';
            covimg.style.opacity='0';
          },200);
        }).catch(()=>{
          // blocked — keep cover, show play button hint
          hud.classList.remove('buffering');
          busy=false;
          showToast('Tap to play ▶');
        });
      } else {
        busy=false;
        hud.classList.remove('buffering');
      }
    });
  });
}

function startProgRaf(){
  cancelAnimationFrame(progRaf);
  function tick(){
    if(vid.duration && !isNaN(vid.duration)){
      pfill.style.width=(vid.currentTime/vid.duration*100)+'%';
    }
    progRaf=requestAnimationFrame(tick);
  }
  progRaf=requestAnimationFrame(tick);
}

// auto-advance + trigger infinite load
vid.addEventListener('ended',()=>{
  goTo(cur+1,'up');
});
vid.addEventListener('waiting',()=>hud.classList.add('buffering'));
vid.addEventListener('playing',()=>hud.classList.remove('buffering'));

// ─────────────────────────────────────────────────────────────
// NAVIGATE
// ─────────────────────────────────────────────────────────────
function goTo(n, dir){
  const next = ((n % feed.length)+feed.length)%feed.length;
  cur = next;
  activate(cur);
  flashSfx(dir==='up'?'↑':'↓');
  liked=false; updLike();

  // fetch more when 3 from end
  if(cur >= feed.length-3) appendMore();
}
const goNext=()=>goTo(cur+1,'up');
const goPrev=()=>goTo(cur-1,'down');

// ─────────────────────────────────────────────────────────────
// HUD TEXT
// ─────────────────────────────────────────────────────────────
function updateHUD(v){
  const cap = v.desc||'';
  document.getElementById('captop').innerHTML =
    cap.length>32 ? cap.replace(/(.{24,35}\s)/,'$1<br>') : cap;
  document.getElementById('sub').textContent      = v.sub||'';
  document.getElementById('uname').textContent    = v.author||'@—';
  document.getElementById('mname').textContent    = v.music||'Original Sound';
  document.getElementById('likenum').textContent  = v.l||'—';
  document.getElementById('comnum').textContent   = v.c||'—';
  document.getElementById('sharenum').textContent = v.s||'—';
}

// ─────────────────────────────────────────────────────────────
// DOTS (show max 10, sliding window)
// ─────────────────────────────────────────────────────────────
function buildDots(){
  const c=document.getElementById('dots');
  const total=Math.min(feed.length,10);
  c.innerHTML='';
  for(let i=0;i<total;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===cur%total?' on':'');
    c.appendChild(d);
  }
}
function updDots(){
  const total=Math.min(feed.length,10);
  document.querySelectorAll('.dot').forEach((d,i)=>
    d.classList.toggle('on',i===cur%total));
}

// ─────────────────────────────────────────────────────────────
// LIKE
// ─────────────────────────────────────────────────────────────
function doLike(){
  liked=!liked; updLike();
  if(liked) spawnHeart();
}
function updLike(){
  document.getElementById('likebtn').classList.toggle('liked',liked);
  document.getElementById('likeico').textContent=liked?'❤️':'🤍';
}
function spawnHeart(){
  const h=document.createElement('div');
  h.className='heart';h.textContent='❤️';
  hud.appendChild(h);
  h.addEventListener('animationend',()=>h.remove());
}

// ─────────────────────────────────────────────────────────────
// SWIPE FX / TOAST / STATUS
// ─────────────────────────────────────────────────────────────
function flashSfx(sym){
  const el=document.getElementById('sfx');
  el.textContent=sym;el.classList.remove('go');
  void el.offsetWidth;el.classList.add('go');
  setTimeout(()=>el.classList.remove('go'),500);
}
function showToast(msg){
  const t=document.getElementById('toastEl');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>t.classList.remove('show'),1400);
}
function setStatus(s){
  const el=document.getElementById('lstatus');
  if(el) el.textContent=s;
}
function hideLoader(){
  document.getElementById('loadscr').classList.add('gone');
}

// ─────────────────────────────────────────────────────────────
// AUDIO UNLOCK
// ─────────────────────────────────────────────────────────────
function unlockAudio(){
  if(!muted) return;
  muted=false;
  vid.muted=false;
  showToast('🔊 Sound on');
}

// ─────────────────────────────────────────────────────────────
// TABS
// ─────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    unlockAudio();
    tabIdx=+t.dataset.i;
    document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('on',i===tabIdx));
    showToast(t.textContent.trim());
  });
});
function shiftTab(d){
  tabIdx=((tabIdx+d)+3)%3;
  document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('on',i===tabIdx));
  showToast(document.querySelector('.tab.on').textContent.trim());
}

// ─────────────────────────────────────────────────────────────
// TOUCH
// ─────────────────────────────────────────────────────────────
const tz=document.getElementById('tz');
tz.addEventListener('touchstart',e=>{
  touchSY=e.touches[0].clientY;
  touchSX=e.touches[0].clientX;
  unlockAudio();
},{passive:true});
tz.addEventListener('touchend',e=>{
  const dy=touchSY-e.changedTouches[0].clientY;
  const dx=touchSX-e.changedTouches[0].clientX;
  if(Math.abs(dy)>40&&Math.abs(dy)>Math.abs(dx))
    dy>0?goNext():goPrev();
  else if(Math.abs(dx)>40)
    shiftTab(dx>0?1:-1);
},{passive:true});
tz.addEventListener('touchend',e=>{
  const now=Date.now();
  if(now-lastTap<300){doLike();showToast('❤️ Liked');}
  lastTap=now;
},{passive:true});
tz.addEventListener('click',()=>{
  unlockAudio();
  const now=Date.now();
  if(now-lastTap<300){doLike();showToast('❤️ Liked');}
  lastTap=now;
});

// ─────────────────────────────────────────────────────────────
// KEYBOARD
// ─────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  unlockAudio();
  if(e.key==='ArrowUp'   ||e.key==='w'){e.preventDefault();goPrev();}
  if(e.key==='ArrowDown' ||e.key==='s'){e.preventDefault();goNext();}
  if(e.key==='ArrowRight'||e.key==='d') shiftTab(1);
  if(e.key==='ArrowLeft' ||e.key==='a') shiftTab(-1);
  if(e.key===' '){
    e.preventDefault();
    vid.paused?vid.play():vid.pause();
    showToast(vid.paused?'⏸ Paused':'▶ Playing');
  }
  if(e.key==='l'||e.key==='L'){doLike();showToast('❤️ Liked');}
  if(e.key==='m'||e.key==='M'){
    muted=!muted;vid.muted=muted;
    showToast(muted?'🔇 Muted':'🔊 Sound on');
  }
});

// ─────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────
buildInitialFeed();
</script>
