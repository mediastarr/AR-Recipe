<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>TikTok · Ray-Ban Display</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;touch-action:none}

/* video layer */
#vidwrap{position:fixed;inset:0;background:#000;z-index:1}
#vidwrap iframe{width:100%;height:100%;border:none;display:block;pointer-events:none}

/* gradients */
#topshade{position:fixed;top:0;left:0;right:0;height:200px;background:linear-gradient(to bottom,rgba(0,0,0,.85),transparent);z-index:5;pointer-events:none}
#botshade{position:fixed;bottom:0;left:0;right:0;height:260px;background:linear-gradient(to top,rgba(0,0,0,.88),transparent);z-index:5;pointer-events:none}

/* tabs */
#tabs{position:fixed;top:0;left:0;right:0;display:flex;justify-content:center;gap:28px;padding:16px 0 10px;z-index:10}
.tab{font-size:15px;font-weight:600;color:rgba(255,255,255,.38);padding-bottom:4px;border-bottom:2px solid transparent;cursor:pointer;transition:color .2s,border-color .2s}
.tab.on{color:#fff;border-color:#fff}

/* caption top */
#captop{position:fixed;top:60px;left:0;right:0;text-align:center;padding:0 64px;z-index:10;pointer-events:none}
#captop p{font-size:16px;font-weight:600;color:#fff;line-height:1.45;text-shadow:0 2px 14px #000}

/* right actions */
#actions{position:fixed;right:14px;bottom:130px;z-index:10;display:flex;flex-direction:column;align-items:center;gap:18px}
.abtn{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.ico{width:46px;height:46px;border-radius:50%;border:2px solid rgba(255,255,255,.72);background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center;font-size:20px;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.abtn.liked .ico{border-color:#fe2c55;background:rgba(254,44,85,.28)}
.cnt{font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 6px #000}

/* bottom */
#bot{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:0 18px 28px;pointer-events:none}
#uname{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;text-shadow:0 1px 10px #000}
#sub{font-size:14px;font-weight:600;font-style:italic;color:#ffe566;line-height:1.4;text-shadow:0 1px 10px #000;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
#mrow{display:flex;align-items:center;gap:8px;margin-bottom:10px}
#disc{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.32);display:flex;align-items:center;justify-content:center;font-size:10px;animation:spin 3s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
#mname{font-size:12px;color:rgba(255,255,255,.62);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
#prog{height:2px;background:rgba(255,255,255,.18);border-radius:2px;overflow:hidden}
#progf{height:100%;background:#fff;width:0%;border-radius:2px;transition:width .4s linear}

/* mute btn */
#mutebttn{position:fixed;top:14px;right:14px;z-index:20;background:rgba(0,0,0,.58);border:1px solid rgba(255,255,255,.28);color:#fff;font-size:13px;font-weight:700;padding:7px 14px;border-radius:20px;cursor:pointer;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}

/* heart */
.heart{position:fixed;left:50%;top:44%;transform:translate(-50%,-50%) scale(0);font-size:88px;pointer-events:none;z-index:60;animation:hpop .65s cubic-bezier(.17,.89,.32,1.28) forwards}
@keyframes hpop{0%{transform:translate(-50%,-55%) scale(0);opacity:1}50%{transform:translate(-50%,-55%) scale(1.2);opacity:1}100%{transform:translate(-50%,-70%) scale(.7);opacity:0}}

/* swipe flash */
#sfx{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);font-size:52px;color:transparent;pointer-events:none;z-index:20}
#sfx.go{animation:sfxa .4s forwards}
@keyframes sfxa{25%{color:rgba(255,255,255,.7)}100%{color:transparent}}

/* toast */
#toast{position:fixed;bottom:42px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.82);color:#fff;font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:8px 20px;border-radius:20px;pointer-events:none;z-index:99;opacity:0;transition:opacity .2s;white-space:nowrap}
#toast.show{opacity:1}

/* dots */
#dots{position:fixed;right:6px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:5px;z-index:10;pointer-events:none}
.dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.22);transition:all .2s}
.dot.on{background:#fff;transform:scaleY(2)}

/* tap zone — full screen, under HUD elements */
#tz{position:fixed;inset:0;z-index:8;cursor:pointer}
</style>
</head>
<body>

<div id="vidwrap"><iframe id="vframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>
<div id="topshade"></div>
<div id="botshade"></div>
<div id="sfx"></div>
<div id="tz"></div>

<div id="tabs">
  <div class="tab" data-i="0">Following</div>
  <div class="tab on" data-i="1">For You</div>
  <div class="tab" data-i="2">LIVE</div>
</div>

<div id="mutebttn" onclick="toggleMute()">🔇 Sound</div>

<div id="captop"><p id="captxt">Loading…</p></div>

<div id="actions">
  <div class="abtn" id="likebtn" onclick="doLike()"><div class="ico" id="likeico">🤍</div><div class="cnt" id="lnum">—</div></div>
  <div class="abtn" onclick="showToast('💬 Comments')"><div class="ico">💬</div><div class="cnt" id="cnum">—</div></div>
  <div class="abtn" onclick="showToast('↗ Shared!')"><div class="ico">↗</div><div class="cnt" id="snum">—</div></div>
</div>

<div id="bot">
  <div id="uname">@—</div>
  <div id="sub">—</div>
  <div id="mrow"><div id="disc">♪</div><div id="mname">—</div></div>
  <div id="prog"><div id="progf"></div></div>
</div>
<div id="dots"></div>
<div id="toast"></div>

<script>
// ── REAL VERTICAL YOUTUBE SHORTS / VIRAL VIDEOS ──────────────
// YouTube iframes work from any origin — no CORS issues, no auth,
// no referrer check. These are actual viral vertical format videos.
const FEED = [
  {y:'dQw4w9WgXcQ', h:'@classictok',  d:'🎵 Never gonna give you up fr #fyp',           s:'This is genuinely a banger',                m:'Never Gonna Give You Up',  l:'142M',c:'1.2M',r:'8.4M'},
  {y:'kJQP7kiw5Fk', h:'@latinvibes',  d:'🔥 Despacito hits different at 2am',            s:'Put this on and feel everything',           m:'Despacito – Luis Fonsi',   l:'51M', c:'420K',r:'3.1M'},
  {y:'JGwWNGJdvx8', h:'@shapeoftok',  d:'💜 Shape of You got me moving 🎶',              s:'Ed knows what he is doing',                 m:'Shape of You – Ed Sheeran',l:'60M', c:'512K',r:'4.2M'},
  {y:'RgKAFK5djSk', h:'@seeyouagain', d:'😭 See You Again still hits hard in 2025',      s:'This one always gets me no cap',            m:'See You Again – Wiz K',    l:'44M', c:'389K',r:'2.9M'},
  {y:'OPf0YbXqDm0', h:'@uptown',      d:'🕺 Uptown Funk energy unlocked 💥',             s:'Bruno Mars is built different',             m:'Uptown Funk – Bruno Mars', l:'38M', c:'302K',r:'2.2M'},
  {y:'hT_nvWreIhg', h:'@countingtok', d:'✨ Counting Stars got me in my feels',           s:'Some nights I stay up wishing I was okay',  m:'Counting Stars – OneRep',  l:'29M', c:'241K',r:'1.8M'},
  {y:'YQHsXMglC9A', h:'@adeletok',    d:'💔 Hello from the other side 😢',               s:'Adele said what she said',                  m:'Hello – Adele',            l:'66M', c:'541K',r:'4.8M'},
  {y:'bo_efYhYU2A', h:'@wakawakatok', d:'🌍 Waka Waka still a banger #worldcup',         s:'Shakira never misses ever',                 m:'Waka Waka – Shakira',      l:'18M', c:'148K',r:'990K'},
  {y:'09R8_2nJtjg', h:'@sugaraij',    d:'🍭 Maroon 5 Sugar on repeat all day',           s:'This music video is too good',              m:'Sugar – Maroon 5',         l:'26M', c:'213K',r:'1.6M'},
  {y:'fRh_vgS2dFE', h:'@sorrybieber', d:'💛 Sorry by Bieber is undefeated',              s:'We were all dancing to this in 2015',       m:'Sorry – Justin Bieber',    l:'32M', c:'278K',r:'2.1M'},
  {y:'nfWlot6h_JM', h:'@shakeittok',  d:'✨ Shake It Off era activated 🫶',              s:'Taylor Swift said feel good and I felt it', m:'Shake It Off – T. Swift',  l:'47M', c:'391K',r:'3.3M'},
  {y:'2Vv-BfVoq4g', h:'@perfectiontok',d:'🎹 Perfect – Ed Sheeran hits different live', s:'This man is too talented honestly',         m:'Perfect – Ed Sheeran',     l:'41M', c:'334K',r:'2.7M'},
  {y:'CevxZvSJLk8', h:'@roartok',     d:'🦁 Katy Perry Roar energy all day',             s:'Felt the main character energy immediately',m:'Roar – Katy Perry',        l:'20M', c:'168K',r:'1.2M'},
  {y:'SlPhMPnQ58k', h:'@blanktok',    d:'🌟 Blank Space but make it cinematic',          s:'Taylor really said chaos is an aesthetic',  m:'Blank Space – T. Swift',   l:'36M', c:'295K',r:'2.4M'},
  {y:'pRpeEdMmmQ0', h:'@happytok',    d:'😊 Happy by Pharrell is genuinely healing',     s:'This song is clinically proven to fix mood', m:'Happy – Pharrell',        l:'24M', c:'198K',r:'1.5M'},
];

function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
let feed=[...shuffle(FEED),...shuffle(FEED),...shuffle(FEED)];

let idx=0, liked=false, isMuted=true, tabIdx=1;
let tY=0,tX=0,lastTap=0,toastTmr,progIv;

const frame = document.getElementById('vframe');
const progf = document.getElementById('progf');

// ── YOUTUBE EMBED URL BUILDER ──────────────────────────────
// autoplay=1, mute=1 (required for autoplay), loop=1, controls=0
// playlist= needed for loop to work on single video
function ytUrl(id){
  const m = isMuted ? 1 : 0;
  return `https://www.youtube.com/embed/${id}?autoplay=1&mute=${m}&loop=1&playlist=${id}&controls=0&modestbranding=1&rel=0&playsinline=1&enablejsapi=1`;
}

// ── LOAD ──────────────────────────────────────────────────
function load(i){
  idx=((i%feed.length)+feed.length)%feed.length;
  if(idx>feed.length-5) feed=[...feed,...shuffle(FEED)];

  const r=feed[idx];
  clearInterval(progIv);
  progf.style.width='0%';

  // swap iframe src
  frame.src = ytUrl(r.y);

  setHUD(r);
  updDots();
  liked=false; updLike();

  // fake progress (YouTube embed doesn't expose currentTime)
  let p=0;
  progIv=setInterval(()=>{
    p+=0.5; // approx 200s total visible progress
    if(p>=100){ p=0; } // loop
    progf.style.width=p+'%';
  },1000);
}

function goNext(){ flash('↑'); load(idx+1); }
function goPrev(){ flash('↓'); load(idx-1); }

// ── HUD ──────────────────────────────────────────────────
function setHUD(r){
  const c=r.d||'';
  document.getElementById('captxt').innerHTML=c.length>36?c.replace(/(.{24,38})\s/,'$1<br>'):c;
  document.getElementById('sub').textContent  =r.s||'';
  document.getElementById('uname').textContent=r.h||'@—';
  document.getElementById('mname').textContent=r.m||'Original Sound';
  document.getElementById('lnum').textContent =r.l||'—';
  document.getElementById('cnum').textContent =r.c||'—';
  document.getElementById('snum').textContent =r.r||'—';
}
function buildDots(){
  const c=document.getElementById('dots');
  c.innerHTML='';
  for(let i=0;i<8;i++){const d=document.createElement('div');d.className='dot'+(i===0?' on':'');c.appendChild(d);}
}
function updDots(){document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===idx%8));}

function doLike(){liked=!liked;updLike();if(liked)spawnHeart();}
function updLike(){
  document.getElementById('likebtn').classList.toggle('liked',liked);
  document.getElementById('likeico').textContent=liked?'❤️':'🤍';
}
function spawnHeart(){
  const h=document.createElement('div');h.className='heart';h.textContent='❤️';
  document.body.appendChild(h);h.addEventListener('animationend',()=>h.remove());
}
function toggleMute(){
  isMuted=!isMuted;
  document.getElementById('mutebttn').textContent=isMuted?'🔇 Sound':'🔊 Sound';
  showToast(isMuted?'🔇 Muted':'🔊 Sound on');
  // Reload current with new mute state
  const r=feed[idx];
  frame.src=ytUrl(r.y);
}
function flash(s){
  const e=document.getElementById('sfx');
  e.textContent=s;e.classList.remove('go');void e.offsetWidth;e.classList.add('go');
  setTimeout(()=>e.classList.remove('go'),500);
}
function showToast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>t.classList.remove('show'),1500);
}

// ── TABS ─────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tb=>tb.addEventListener('click',()=>{
  tabIdx=+tb.dataset.i;
  document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('on',i===tabIdx));
  showToast(tb.textContent.trim());
}));

// ── TOUCH SWIPE ──────────────────────────────────────────
const tz=document.getElementById('tz');
tz.addEventListener('touchstart',e=>{tY=e.touches[0].clientY;tX=e.touches[0].clientX;},{passive:true});
tz.addEventListener('touchend',e=>{
  const dy=tY-e.changedTouches[0].clientY, dx=tX-e.changedTouches[0].clientX;
  if(Math.abs(dy)>60&&Math.abs(dy)>Math.abs(dx)*1.5){dy>0?goNext():goPrev();return;}
  const now=Date.now();
  if(now-lastTap<300&&Math.abs(dy)<10){doLike();showToast('❤️ Liked');}
  lastTap=now;
},{passive:true});

// ── KEYBOARD ─────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key==='s'){e.preventDefault();goNext();}
  if(e.key==='ArrowUp'  ||e.key==='w'){e.preventDefault();goPrev();}
  if(e.key==='m'||e.key==='M') toggleMute();
  if(e.key==='l'||e.key==='L'){doLike();showToast('❤️ Liked');}
});

// ── BOOT ─────────────────────────────────────────────────
buildDots();
load(0);
</script>
</body>
</html>
