<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TikTok · Ray-Ban Display</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  width:100%;min-height:100vh;
  background:#0e0507;
  display:flex;align-items:center;justify-content:center;
  font-family:'Inter',sans-serif;
  overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 100% 70% at 50% 10%,#3a0912 0%,#150508 55%,#080204 100%);
  z-index:0;
}
.hud{
  position:relative;z-index:1;
  width:600px;height:600px;
  background:#000;
  border-radius:56px;
  overflow:hidden;
  box-shadow:0 0 0 1.5px rgba(255,255,255,.07),0 0 60px rgba(180,10,40,.2),0 30px 80px rgba(0,0,0,.85);
}

/* ── single video element, we just swap src ── */
#mainvid{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  background:#000;
  z-index:1;
}

/* cover shown while video loads */
#covimg{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  z-index:2;
  transition:opacity .3s;
}

/* slide transition overlay */
#slideout{
  position:absolute;inset:0;z-index:3;
  background:#000;
  opacity:0;pointer-events:none;
  transition:opacity .18s;
}

.vignette{
  position:absolute;inset:0;z-index:5;pointer-events:none;
  background:linear-gradient(to bottom,
    rgba(0,0,0,.78) 0%,rgba(0,0,0,0) 22%,
    rgba(0,0,0,0) 60%,rgba(0,0,0,.82) 100%);
  border-radius:56px;
}
.tapzone{position:absolute;inset:0;z-index:8;cursor:pointer;border-radius:56px;}

.tabs{
  position:absolute;top:26px;left:0;right:0;
  display:flex;justify-content:center;gap:28px;
  z-index:10;pointer-events:all;
}
.tab{
  font-size:14px;font-weight:600;
  color:rgba(255,255,255,.35);
  cursor:pointer;user-select:none;
  padding-bottom:5px;border-bottom:2px solid transparent;
  transition:color .2s,border-color .2s;letter-spacing:.01em;
}
.tab.on{color:#fff;border-bottom-color:#fff;}

.cap-top{
  position:absolute;top:70px;left:0;right:0;
  text-align:center;z-index:10;padding:0 52px;pointer-events:none;
}
.cap-top p{
  font-size:17px;font-weight:500;
  color:rgba(255,255,255,.92);line-height:1.45;
  text-shadow:0 2px 14px rgba(0,0,0,1);
}

.actions{
  position:absolute;right:14px;bottom:108px;
  z-index:10;display:flex;flex-direction:column;
  align-items:center;gap:16px;pointer-events:all;
}
.abtn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;user-select:none;}
.aicon{
  width:44px;height:44px;border-radius:50%;
  border:2px solid rgba(255,255,255,.75);
  background:rgba(0,0,0,.35);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:transform .15s,background .15s;
}
.abtn:active .aicon{transform:scale(.88);}
.abtn.liked .aicon{border-color:#ff2d55;background:rgba(255,45,85,.25);}
.acount{font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.9);}

.botbar{
  position:absolute;bottom:0;left:0;right:0;
  z-index:10;padding:0 20px 18px;pointer-events:none;
}
.username{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px;text-shadow:0 1px 8px rgba(0,0,0,.9);}
.subtitle{
  font-size:15px;font-weight:600;font-style:italic;
  color:#ffe566;line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  text-shadow:0 1px 6px rgba(0,0,0,.95);margin-bottom:8px;
}
.mrow{display:flex;align-items:center;gap:7px;margin-bottom:9px;}
.disc{
  width:22px;height:22px;border-radius:50%;
  background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.35);
  display:flex;align-items:center;justify-content:center;font-size:10px;
  animation:spin 3s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}
.mname{font-size:12px;color:rgba(255,255,255,.6);text-shadow:0 1px 6px rgba(0,0,0,.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:270px;}
.prog{height:2px;background:rgba(255,255,255,.18);border-radius:2px;overflow:hidden;}
.progfill{height:100%;background:rgba(255,255,255,.8);border-radius:2px;width:0%;transition:width .3s linear;}

.dots{
  position:absolute;bottom:12px;left:0;right:0;
  display:flex;justify-content:center;gap:6px;z-index:10;pointer-events:none;
}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.22);transition:background .2s,transform .2s;}
.dot.on{background:rgba(255,255,255,.85);transform:scale(1.5);}

.heart{
  position:absolute;left:50%;top:45%;
  transform:translate(-50%,-50%) scale(0);
  font-size:86px;pointer-events:none;z-index:50;
  animation:hpop .65s cubic-bezier(.17,.89,.32,1.28) forwards;
}
@keyframes hpop{
  0%{transform:translate(-50%,-55%) scale(0);opacity:1}
  45%{transform:translate(-50%,-55%) scale(1.2);opacity:1}
  100%{transform:translate(-50%,-72%) scale(.7);opacity:0}
}

.swipefx{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  font-size:44px;color:rgba(255,255,255,0);
  pointer-events:none;z-index:20;
}
.swipefx.go{animation:sfx .45s forwards;}
@keyframes sfx{0%{color:rgba(255,255,255,0)}25%{color:rgba(255,255,255,.7)}100%{color:rgba(255,255,255,0)}}

/* spinner shown while video buffering */
.buffspin{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:38px;height:38px;
  border:3px solid rgba(255,255,255,.15);
  border-top-color:rgba(255,255,255,.7);
  border-radius:50%;
  animation:spin .75s linear infinite;
  z-index:6;
  display:none;
}
.buffering .buffspin{display:block;}

.toast{
  position:fixed;bottom:36px;left:50%;transform:translateX(-50%);
  background:rgba(10,10,10,.82);color:rgba(255,255,255,.88);
  font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  padding:8px 20px;border-radius:24px;border:1px solid rgba(255,255,255,.1);
  pointer-events:none;z-index:999;opacity:0;transition:opacity .25s;white-space:nowrap;
}
.toast.show{opacity:1;}

.guide{
  position:fixed;right:max(20px,calc(50% - 420px));top:50%;transform:translateY(-50%);
  width:175px;color:rgba(255,255,255,.3);font-size:10px;line-height:1.9;z-index:2;
}
.guide h4{color:rgba(255,255,255,.55);font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
.guide .r{display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.05);padding:2px 0;}
.guide .k{color:rgba(255,255,255,.7);}
.note{margin-top:10px;color:rgba(255,255,255,.18);font-size:9px;line-height:1.7;}
@media(max-width:860px){.guide{display:none;}}
@media(max-width:620px){.hud{width:100vw;height:100vw;border-radius:0;}.vignette,.tapzone{border-radius:0;}}
</style>
</head>
<body>

<div class="hud" id="hud">
  <!-- single video + cover swap approach — guarantees play on every reel -->
  <video id="mainvid" playsinline muted loop autoplay></video>
  <img  id="covimg"  src="" alt="">
  <div  id="slideout"></div>
  <div  class="buffspin" id="buffspin"></div>

  <div class="vignette"></div>
  <div class="tapzone" id="tz"></div>
  <div class="swipefx" id="sfx">↑</div>

  <div class="tabs">
    <div class="tab"    data-i="0">Following</div>
    <div class="tab on" data-i="1">For You</div>
    <div class="tab"    data-i="2">LIVE</div>
  </div>

  <div class="cap-top"><p id="captop">Loading…</p></div>

  <div class="actions">
    <div class="abtn" id="likebtn" onclick="doLike()">
      <div class="aicon" id="likeico">🤍</div>
      <div class="acount" id="likenum">—</div>
    </div>
    <div class="abtn" onclick="showToast('💬 Comments')">
      <div class="aicon">💬</div>
      <div class="acount" id="comnum">—</div>
    </div>
    <div class="abtn" onclick="showToast('↗ Shared!')">
      <div class="aicon">↗</div>
      <div class="acount" id="sharenum">—</div>
    </div>
  </div>

  <div class="botbar">
    <div class="username" id="uname">@—</div>
    <div class="subtitle"  id="sub">—</div>
    <div class="mrow"><div class="disc">♪</div><div class="mname" id="mname">—</div></div>
    <div class="prog"><div class="progfill" id="pf"></div></div>
  </div>

  <div class="dots" id="dots"></div>
</div>

<div class="toast" id="toastEl"></div>

<div class="guide">
  <h4>Controls</h4>
  <div class="r"><span class="k">↑ / W</span><span>Prev</span></div>
  <div class="r"><span class="k">↓ / S</span><span>Next</span></div>
  <div class="r"><span class="k">← →</span><span>Tab</span></div>
  <div class="r"><span class="k">Space</span><span>Mute</span></div>
  <div class="r"><span class="k">L</span><span>Like</span></div>
  <div class="r"><span class="k">Dbl-tap</span><span>Like ❤️</span></div>
  <div class="note">Meta Ray-Ban Display<br>600×600 · 20° FOV<br>#000 = transparent on lens</div>
</div>

<script>
// ─────────────────────────────────────────
// FEED  — real tikwm CDN mp4s
// ─────────────────────────────────────────
const FEED = [
  { id:'7163783733223443717', author:'@viral',       desc:'How the girl from church got my bro acting',       sub:'I used to sit over there with my boyfriend Tyrone', music:'Original Sound',        likes:'3.1M', com:'21K', sh:'140K' },
  { id:'7390978565271014686', author:'@natgeo',      desc:'Ocean depths never seen before 🌊',                sub:'Deep dive footage reveals the unknown',              music:'NatGeo Soundscape',     likes:'2.1M', com:'14K', sh:'98K'  },
  { id:'7452334958313540869', author:'@storytime',   desc:'POV: you finally texted your situationship back',  sub:'Why are you acting like I did something wrong',      music:'Situationship SZN',     likes:'984K', com:'11K', sh:'43K'  },
  { id:'7460668663742385430', author:'@dramatics',   desc:'The audacity of this man at Thanksgiving 💀',      sub:'Can you pass me the remote',                         music:'Family Drama Mix',       likes:'2.1M', com:'18K', sh:'110K' },
  { id:'7460964050600529159', author:'@relatable',   desc:"When she says I'm not mad but she clearly is",     sub:"I'm fine. Everything is absolutely fine.",           music:"She's Fine (Original)", likes:'3.4M', com:'29K', sh:'198K' },
  { id:'7046553134654868782', author:'@bestiesbelike',desc:'My bestie when she sees her ex at the mall',      sub:'Oh wow I look amazing today wow',                    music:'Glow Up Energy',        likes:'541K', com:'7.2K', sh:'28K'  },
  { id:'7287791218765084970', author:'@officetok',   desc:'Corporate America got me acting different fr',     sub:'Per my last email.',                                 music:'Work Mode Lo-fi',        likes:'763K', com:'9.4K', sh:'52K'  },
  { id:'7324512893476012321', author:'@familyreunion',desc:'That one cousin who thinks they run the cookout', sub:'Nobody told you to season it like that',             music:'Cookout Vibes',          likes:'1.8M', com:'22K', sh:'95K'  },
  { id:'7229069534956707114', author:'@shoppingtok', desc:'Me after 3 hrs online shopping for nothing',       sub:'Add to cart. Remove from cart.',                     music:'Retail Therapy Beat',    likes:'481K', com:'5.3K', sh:'19K'  },
  { id:'7196098283047622955', author:'@techreview',  desc:'Ray-Ban Meta glasses review — actually good now', sub:'These might be the best wearables yet',              music:'Tech Talk',              likes:'763K', com:'11K', sh:'52K'  },
  { id:'7052462750193935621', author:'@mountainlife',desc:'4am summit — worth every cold step 🏔️',            sub:'The views make every step worth it',                 music:'Morning Anthem',         likes:'2.9M', com:'18K', sh:'130K' },
  { id:'7137425612226282757', author:'@codewithme',  desc:'10 CSS tricks that actually save time ⚡',          sub:'Number 7 will change your life fr',                  music:'Focus Flow',             likes:'481K', com:'5.3K', sh:'38K'  },
];

// build play url from tikwm CDN
const playUrl  = id => `https://www.tikwm.com/video/media/play/${id}.mp4`;
const coverUrl = id => `https://www.tikwm.com/video/cover/${id}.jpeg`;

// ─────────────────────────────────────────
// ELEMENTS
// ─────────────────────────────────────────
const vid      = document.getElementById('mainvid');
const covimg   = document.getElementById('covimg');
const slideout = document.getElementById('slideout');
const hud      = document.getElementById('hud');
const pfill    = document.getElementById('pf');

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let cur       = 0;
let muted     = true;   // start muted so autoplay works, unmute on first interaction
let liked     = false;
let tabIdx    = 1;
let lastTap   = 0;
let touchSY   = 0, touchSX = 0;
let toastTmr;
let progRaf;
let navigating = false;

// ─────────────────────────────────────────
// VIDEO ENGINE
// Core idea: ONE <video> element, swap src.
// Cover image shown during load, fades out
// once video has data. This guarantees play()
// works because the gesture that triggered
// navigation also unlocks autoplay.
// ─────────────────────────────────────────
function loadReel(index, direction) {
  if (navigating) return;
  navigating = true;

  const v = FEED[index];

  // flash black transition
  slideout.style.opacity = '1';
  slideout.style.transition = 'opacity .12s';

  setTimeout(() => {
    // swap src while black
    vid.pause();
    vid.src = playUrl(v.id);
    vid.load();

    // show cover immediately
    covimg.src = coverUrl(v.id);
    covimg.style.opacity = '1';

    updateHUD(v);
    updDots();
    cancelAnimationFrame(progRaf);
    pfill.style.width = '0%';

    // fade transition back in
    slideout.style.transition = 'opacity .15s';
    slideout.style.opacity    = '0';

    // play — this works because we're in a setTimeout
    // triggered from a user gesture chain
    const p = vid.play();
    if (p) p.catch(() => {
      // if blocked, try muted
      vid.muted = true;
      vid.play().catch(() => {});
    });

    // fade out cover once video has enough data
    const onData = () => {
      covimg.style.transition = 'opacity .4s';
      covimg.style.opacity = '0';
      startProgRaf();
      navigating = false;
    };
    vid.addEventListener('canplay', onData, { once: true });
    // fallback if cover never fires
    setTimeout(() => {
      covimg.style.opacity = '0';
      startProgRaf();
      navigating = false;
    }, 1800);

  }, 130);
}

function startProgRaf() {
  cancelAnimationFrame(progRaf);
  function tick() {
    if (vid.duration) {
      pfill.style.width = (vid.currentTime / vid.duration * 100) + '%';
    }
    progRaf = requestAnimationFrame(tick);
  }
  progRaf = requestAnimationFrame(tick);
}

// ─────────────────────────────────────────
// NAVIGATE
// ─────────────────────────────────────────
function goTo(n, dir) {
  cur = ((n % FEED.length) + FEED.length) % FEED.length;
  loadReel(cur, dir);
  flashSfx(dir === 'up' ? '↑' : '↓');
  liked = false; updLike();
}
const goNext = () => goTo(cur + 1, 'up');
const goPrev = () => goTo(cur - 1, 'down');

// ─────────────────────────────────────────
// HUD TEXT
// ─────────────────────────────────────────
function updateHUD(v) {
  document.getElementById('captop').innerHTML =
    v.desc.length > 34
      ? v.desc.replace(/(.{28,38}\s)/,'$1<br>')
      : v.desc;
  document.getElementById('sub').textContent      = v.sub;
  document.getElementById('uname').textContent    = v.author;
  document.getElementById('mname').textContent    = v.music;
  document.getElementById('likenum').textContent  = v.likes;
  document.getElementById('comnum').textContent   = v.com;
  document.getElementById('sharenum').textContent = v.sh;
}

// ─────────────────────────────────────────
// DOTS
// ─────────────────────────────────────────
function buildDots() {
  const c = document.getElementById('dots');
  FEED.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === cur ? ' on' : '');
    c.appendChild(d);
  });
}
function updDots() {
  document.querySelectorAll('.dot').forEach((d, i) =>
    d.classList.toggle('on', i === cur));
}

// ─────────────────────────────────────────
// LIKE
// ─────────────────────────────────────────
function doLike() {
  liked = !liked; updLike();
  if (liked) spawnHeart();
}
function updLike() {
  document.getElementById('likebtn').classList.toggle('liked', liked);
  document.getElementById('likeico').textContent = liked ? '❤️' : '🤍';
}
function spawnHeart() {
  const h = document.createElement('div');
  h.className = 'heart'; h.textContent = '❤️';
  hud.appendChild(h);
  h.addEventListener('animationend', () => h.remove());
}

// ─────────────────────────────────────────
// SWIPE FX
// ─────────────────────────────────────────
function flashSfx(sym) {
  const el = document.getElementById('sfx');
  el.textContent = sym;
  el.classList.remove('go'); void el.offsetWidth;
  el.classList.add('go');
  setTimeout(() => el.classList.remove('go'), 500);
}

// ─────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toastEl');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => t.classList.remove('show'), 1400);
}

// ─────────────────────────────────────────
// UNMUTE helper — called on first touch/key
// ─────────────────────────────────────────
function unlockAudio() {
  if (!muted) return;
  muted = false;
  vid.muted = false;
  vid.play().catch(() => {});
}

// ─────────────────────────────────────────
// TABS
// ─────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    unlockAudio();
    tabIdx = +t.dataset.i;
    document.querySelectorAll('.tab').forEach((x, i) =>
      x.classList.toggle('on', i === tabIdx));
    showToast(t.textContent.trim());
  });
});
function shiftTab(d) {
  tabIdx = ((tabIdx + d) + 3) % 3;
  document.querySelectorAll('.tab').forEach((x, i) =>
    x.classList.toggle('on', i === tabIdx));
  showToast(document.querySelector('.tab.on').textContent.trim());
}

// ─────────────────────────────────────────
// TOUCH
// ─────────────────────────────────────────
const tz = document.getElementById('tz');
tz.addEventListener('touchstart', e => {
  touchSY = e.touches[0].clientY;
  touchSX = e.touches[0].clientX;
  unlockAudio();
}, { passive: true });

tz.addEventListener('touchend', e => {
  const dy = touchSY - e.changedTouches[0].clientY;
  const dx = touchSX - e.changedTouches[0].clientX;
  if (Math.abs(dy) > 40 && Math.abs(dy) > Math.abs(dx))
    dy > 0 ? goNext() : goPrev();
  else if (Math.abs(dx) > 40)
    shiftTab(dx > 0 ? 1 : -1);
}, { passive: true });

// double-tap like
tz.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTap < 300) { doLike(); showToast('❤️ Liked'); }
  lastTap = now;
}, { passive: true });

tz.addEventListener('click', () => {
  unlockAudio();
  const now = Date.now();
  if (now - lastTap < 300) { doLike(); showToast('❤️ Liked'); }
  lastTap = now;
});

// ─────────────────────────────────────────
// KEYBOARD
// ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  unlockAudio();
  if (e.key === 'ArrowUp'    || e.key === 'w') { e.preventDefault(); goPrev(); }
  if (e.key === 'ArrowDown'  || e.key === 's') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowRight' || e.key === 'd') shiftTab(1);
  if (e.key === 'ArrowLeft'  || e.key === 'a') shiftTab(-1);
  if (e.key === ' ') {
    e.preventDefault();
    vid.paused ? vid.play() : vid.pause();
    showToast(vid.paused ? '⏸ Paused' : '▶ Playing');
  }
  if (e.key === 'l' || e.key === 'L') { doLike(); showToast('❤️ Liked'); }
});

// ─────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────
buildDots();

// load first reel — muted autoplay works everywhere
vid.muted = true;
vid.src   = playUrl(FEED[0].id);
vid.load();
vid.play().catch(() => {});
covimg.src = coverUrl(FEED[0].id);
vid.addEventListener('canplay', () => {
  covimg.style.transition = 'opacity .4s';
  covimg.style.opacity = '0';
  startProgRaf();
}, { once: true });
setTimeout(() => { covimg.style.opacity = '0'; startProgRaf(); }, 2000);
updateHUD(FEED[0]);

// preload next 2 videos using hidden Audio objects (tricks browser into caching)
function preloadNext() {
  [1, 2].forEach(offset => {
    const idx = (cur + offset) % FEED.length;
    const a = document.createElement('link');
    a.rel = 'prefetch'; a.as = 'video';
    a.href = playUrl(FEED[idx].id);
    document.head.appendChild(a);
  });
}
preloadNext();
vid.addEventListener('timeupdate', () => {
  if (vid.duration && vid.currentTime / vid.duration > 0.7) preloadNext();
});

// when video ends naturally, go next
vid.addEventListener('ended', goNext);
</script>
</body>
</html>
