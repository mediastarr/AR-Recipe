<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>TikTok · Ray-Ban Display</title>
<style>
html,body{
  margin:0;padding:0;
  width:100%;height:100%;
  background:#000;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;
  -webkit-tap-highlight-color:transparent;
  touch-action:none;
}

/* ── single video fills screen ── */
#vid{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
  background:#000;
  z-index:1;
}

/* ── dark gradient overlays ── */
#top-shade{
  position:fixed;top:0;left:0;right:0;height:180px;
  background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);
  z-index:5;pointer-events:none;
}
#bot-shade{
  position:fixed;bottom:0;left:0;right:0;height:250px;
  background:linear-gradient(to top,rgba(0,0,0,.85),transparent);
  z-index:5;pointer-events:none;
}

/* ── tabs ── */
#tabs{
  position:fixed;top:0;left:0;right:0;
  display:flex;justify-content:center;gap:28px;
  padding:14px 0 10px;
  z-index:10;
}
.tab{
  font-size:15px;font-weight:600;
  color:rgba(255,255,255,.4);
  padding-bottom:4px;
  border-bottom:2px solid transparent;
  cursor:pointer;
}
.tab.on{color:#fff;border-color:#fff;}

/* ── caption top ── */
#captop{
  position:fixed;top:56px;left:0;right:0;
  text-align:center;
  padding:0 60px;
  z-index:10;pointer-events:none;
}
#captop p{
  font-size:16px;font-weight:600;color:#fff;
  line-height:1.45;
  text-shadow:0 2px 12px rgba(0,0,0,.9);
}

/* ── right actions ── */
#actions{
  position:fixed;right:14px;bottom:120px;
  z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
.abtn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;
}
.ico{
  width:46px;height:46px;border-radius:50%;
  border:2px solid rgba(255,255,255,.75);
  background:rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  -webkit-backdrop-filter:blur(8px);
  backdrop-filter:blur(8px);
}
.abtn.liked .ico{border-color:#fe2c55;background:rgba(254,44,85,.3);}
.cnt{font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 6px #000;}

/* ── bottom bar ── */
#botbar{
  position:fixed;bottom:0;left:0;right:0;
  z-index:10;padding:0 18px 30px;
  pointer-events:none;
}
#uname{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;text-shadow:0 1px 8px #000;}
#sub{font-size:14px;font-style:italic;font-weight:600;color:#ffe566;line-height:1.4;margin-bottom:8px;text-shadow:0 1px 8px #000;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
#mrow{display:flex;align-items:center;gap:7px;margin-bottom:10px;}
#disc{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:10px;animation:spin 3s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
#mname{font-size:12px;color:rgba(255,255,255,.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px;}
#prog{height:2px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden;}
#progf{height:100%;background:#fff;width:0%;border-radius:2px;}

/* ── mute button ── */
#mutebttn{
  position:fixed;top:14px;right:16px;
  z-index:20;
  background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.3);
  color:#fff;font-size:13px;font-weight:700;
  padding:7px 14px;border-radius:20px;
  cursor:pointer;
  -webkit-backdrop-filter:blur(6px);
  backdrop-filter:blur(6px);
}

/* ── heart pop ── */
.heart{
  position:fixed;left:50%;top:44%;
  transform:translate(-50%,-50%) scale(0);
  font-size:90px;pointer-events:none;z-index:50;
  animation:hpop .65s cubic-bezier(.17,.89,.32,1.28) forwards;
}
@keyframes hpop{
  0%{transform:translate(-50%,-55%) scale(0);opacity:1}
  50%{transform:translate(-50%,-55%) scale(1.2);opacity:1}
  100%{transform:translate(-50%,-70%) scale(.7);opacity:0}
}

/* ── swipe arrow flash ── */
#sfx{
  position:fixed;left:50%;top:50%;
  transform:translate(-50%,-50%);
  font-size:52px;color:transparent;
  pointer-events:none;z-index:20;
}
#sfx.go{animation:sfxa .4s forwards;}
@keyframes sfxa{25%{color:rgba(255,255,255,.7);}100%{color:transparent;}}

/* ── toast ── */
#toast{
  position:fixed;bottom:50px;left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.8);color:#fff;
  font-size:12px;font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;padding:8px 20px;
  border-radius:20px;pointer-events:none;
  z-index:99;opacity:0;transition:opacity .2s;
  white-space:nowrap;
}
#toast.show{opacity:1;}

/* ── buffer ring ── */
#bufring{
  position:fixed;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:44px;height:44px;
  border:4px solid rgba(255,255,255,.15);
  border-top-color:#fff;border-radius:50%;
  z-index:15;display:none;
  animation:spin .75s linear infinite;
}
.buf #bufring{display:block;}

/* ── dot indicator ── */
#dots{
  position:fixed;right:8px;top:50%;
  transform:translateY(-50%);
  display:flex;flex-direction:column;gap:5px;
  z-index:10;pointer-events:none;
}
.dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.25);}
.dot.on{background:#fff;transform:scaleY(2);}
</style>
</head>
<body>

<!-- video — always visible, no splash blocking it -->
<video id="vid" playsinline muted loop autoplay></video>

<div id="top-shade"></div>
<div id="bot-shade"></div>
<div id="bufring"></div>
<div id="sfx"></div>

<!-- tabs -->
<div id="tabs">
  <div class="tab" data-i="0">Following</div>
  <div class="tab on" data-i="1">For You</div>
  <div class="tab" data-i="2">LIVE</div>
</div>

<!-- mute -->
<div id="mutebttn" onclick="toggleMute()">🔇 Sound</div>

<!-- caption -->
<div id="captop"><p id="captxt">Loading…</p></div>

<!-- actions -->
<div id="actions">
  <div class="abtn" id="likebtn" onclick="doLike()">
    <div class="ico" id="likeico">🤍</div><div class="cnt" id="lnum">—</div>
  </div>
  <div class="abtn" onclick="showToast('💬 Comments')">
    <div class="ico">💬</div><div class="cnt" id="cnum">—</div>
  </div>
  <div class="abtn" onclick="showToast('↗ Shared!')">
    <div class="ico">↗</div><div class="cnt" id="snum">—</div>
  </div>
</div>

<!-- bottom bar -->
<div id="botbar">
  <div id="uname">@—</div>
  <div id="sub">—</div>
  <div id="mrow"><div id="disc">♪</div><div id="mname">—</div></div>
  <div id="prog"><div id="progf"></div></div>
</div>

<!-- dots -->
<div id="dots"></div>

<div id="toast"></div>

<script>
// ── VIDEO POOL (storage.googleapis.com — open CORS, confirmed working) ──
const G = 'https://storage.googleapis.com/gtv-videos-bucket/sample/';
const POOL = [
  {u:G+'ForBiggerBlazes.mp4',        h:'@firetok',     d:'🔥 Fire content you cannot skip #fyp',          s:'This is what going viral feels like',         m:'Fire – Kasabian',          l:'4.2M',c:'28K',r:'180K'},
  {u:G+'ForBiggerEscapes.mp4',       h:'@escapetok',   d:'🌍 Said yes to everything this week',            s:'Best decision I have ever made no cap',        m:'No Limits',                l:'3.1M',c:'19K',r:'95K'},
  {u:G+'ForBiggerFun.mp4',           h:'@funtok',      d:'🎉 Living my best life #fyp #vibes',             s:'Main character era fully activated',            m:'Good as Hell – Lizzo',     l:'5.8M',c:'44K',r:'310K'},
  {u:G+'ForBiggerJoyrides.mp4',      h:'@roadtrip',    d:'🚗 Road trip season is officially here',         s:'Windows down music up no GPS needed',           m:'Joyride – Kesha',          l:'2.9M',c:'21K',r:'120K'},
  {u:G+'ForBiggerMeltdowns.mp4',     h:'@dramatok',    d:'💀 Corporate asked me to circle back',           s:'I am not okay and that is totally okay',        m:'Drama – Ethel Cain',       l:'7.3M',c:'61K',r:'420K'},
  {u:G+'SubaruOutbackOnStreetAndDirt.mp4',h:'@outdoor',d:'🏔️ Built different #adventure #outdoors',      s:'Not all those who wander are lost',             m:'Higher Ground – RHCP',     l:'1.8M',c:'13K',r:'67K'},
  {u:G+'TearsOfSteel.mp4',           h:'@scifitok',    d:'🤖 This is what 2026 looks like ✨',              s:'The future arrived early and I am ready',       m:'Interstellar OST',         l:'6.4M',c:'52K',r:'380K'},
  {u:G+'VolkswagenGTIReview.mp4',    h:'@cartok',      d:'🏎️ Finally got the dream car POV',              s:'Saved for 3 years. Worth every single penny.',  m:'Fast Car – Tracy Chapman', l:'3.5M',c:'27K',r:'148K'},
  {u:G+'WeAreGoingOnBullrun.mp4',    h:'@traveltok',   d:'🌎 We said yes to the adventure',                s:'Life is too short for boring trips fr',          m:'Adventure of a Lifetime',  l:'4.7M',c:'38K',r:'220K'},
  {u:G+'WhatCarCanYouGetForAGrand.mp4',h:'@carmontok', d:'🚨 $1000 car challenge (you wont believe)',      s:'Comments going absolutely insane rn',            m:'Money – Cardi B',          l:'9.1M',c:'83K',r:'571K'},
  {u:G+'BigBuckBunny.mp4',           h:'@animationtok',d:'🐰 This bunny has absolutely no chill 😭',      s:'The lore goes deep trust me on this',            m:'Bunny Hop Remix',          l:'11M', c:'94K',r:'650K'},
  {u:G+'ElephantsDream.mp4',         h:'@dreamtok',    d:'✨ Dreams you can actually step inside',         s:'This is what the subconscious looks like',       m:'Dreaming – Blondie',       l:'3.8M',c:'29K',r:'155K'},
  {u:G+'Sintel.mp4',                 h:'@epictok',     d:'🐉 Found a dragon. Life is different now.',      s:'Nobody talks about this enough fr',              m:'Epic Orchestral Score',    l:'5.2M',c:'43K',r:'278K'},
  {u:G+'ForBiggerBlazes.mp4',        h:'@mindset',     d:'💡 You are doing better than you think',         s:'Every single day is a W. Even the hard ones.',  m:'Eye of the Tiger',         l:'3.9M',c:'31K',r:'172K'},
  {u:G+'ForBiggerEscapes.mp4',       h:'@wandertok',   d:'✈️ Quit job. Bought ticket. Went.',              s:'No plan. Best trip of my life. Period.',         m:'Free Fallin – Tom Petty',  l:'8.6M',c:'72K',r:'501K'},
];

function shuffle(a){return[...a].sort(()=>Math.random()-.5);}
let feed=[...shuffle(POOL),...shuffle(POOL),...shuffle(POOL)]; // ~45 items
let idx=0, isMuted=true, liked=false, tabIdx=1;
let lastTap=0, tY=0, tX=0, toastTmr, progIv;

const vid    = document.getElementById('vid');
const body   = document.body;
const progf  = document.getElementById('progf');

// ── LOAD & PLAY ─────────────────────────────────────────────
function load(i){
  idx = ((i%feed.length)+feed.length)%feed.length;
  // grow feed near end
  if(idx > feed.length-5) feed=[...feed,...shuffle(POOL)];

  const r = feed[idx];

  // stop progress
  clearInterval(progIv);
  progf.style.width='0%';

  // show spinner
  body.classList.add('buf');

  // swap src — simplest possible approach
  vid.muted  = true; // always start muted (iOS requirement)
  vid.src    = r.u;
  vid.load();

  const p = vid.play();
  if(p) p.then(onPlay).catch(()=>{
    body.classList.remove('buf');
    // still show cover — try again on next user tap
  });

  updateHUD(r);
  updDots();
  liked=false; updLike();
}

function onPlay(){
  body.classList.remove('buf');
  // apply actual mute state once playing
  vid.muted = isMuted;
  clearInterval(progIv);
  progIv = setInterval(()=>{
    if(!vid.duration) return;
    progf.style.width = Math.min(vid.currentTime/vid.duration*100,99)+'%';
  }, 250);
}

vid.addEventListener('waiting',()=>body.classList.add('buf'));
vid.addEventListener('playing',()=>body.classList.remove('buf'));

// ── NAV ──────────────────────────────────────────────────────
function goNext(){ flash('↑'); load(idx+1); }
function goPrev(){ flash('↓'); load(idx-1); }

// ── TOUCH SWIPE (vertical) ───────────────────────────────────
// Using touchstart/touchend directly — more reliable than scroll on iOS
document.addEventListener('touchstart',e=>{
  tY=e.touches[0].clientY;
  tX=e.touches[0].clientX;
},{passive:true});

document.addEventListener('touchend',e=>{
  const dy = tY - e.changedTouches[0].clientY;
  const dx = tX - e.changedTouches[0].clientX;
  // require clear vertical intent
  if(Math.abs(dy)>60 && Math.abs(dy)>Math.abs(dx)*1.5){
    dy>0 ? goNext() : goPrev();
    return;
  }
  // double-tap like
  const now=Date.now();
  if(now-lastTap<300 && Math.abs(dy)<10){ doLike(); showToast('❤️ Liked'); }
  lastTap=now;
},{passive:true});

// ── HUD ──────────────────────────────────────────────────────
function updateHUD(r){
  const c=r.d||'';
  document.getElementById('captxt').innerHTML = c.length>36?c.replace(/(.{26,38})\s/,'$1<br>'):c;
  document.getElementById('sub').textContent   = r.s||'';
  document.getElementById('uname').textContent = r.h||'@—';
  document.getElementById('mname').textContent = r.m||'Original Sound';
  document.getElementById('lnum').textContent  = r.l||'—';
  document.getElementById('cnum').textContent  = r.c||'—';
  document.getElementById('snum').textContent  = r.r||'—';
}

// ── DOTS ─────────────────────────────────────────────────────
function buildDots(){
  const c=document.getElementById('dots');
  c.innerHTML='';
  for(let i=0;i<8;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===0?' on':'');
    c.appendChild(d);
  }
}
function updDots(){
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===idx%8));
}

// ── LIKE ─────────────────────────────────────────────────────
function doLike(){
  liked=!liked; updLike();
  if(liked) spawnHeart();
}
function updLike(){
  document.getElementById('likebtn').classList.toggle('liked',liked);
  document.getElementById('likeico').textContent=liked?'❤️':'🤍';
}
function spawnHeart(){
  const h=document.createElement('div');
  h.className='heart';h.textContent='❤️';
  document.body.appendChild(h);
  h.addEventListener('animationend',()=>h.remove());
}

// ── MUTE ─────────────────────────────────────────────────────
function toggleMute(){
  isMuted=!isMuted;
  vid.muted=isMuted;
  document.getElementById('mutebttn').textContent=isMuted?'🔇 Sound':'🔊 Sound';
  showToast(isMuted?'🔇 Muted':'🔊 Sound on');
}

// ── FX & TOAST ───────────────────────────────────────────────
function flash(s){
  const e=document.getElementById('sfx');
  e.textContent=s;e.classList.remove('go');
  void e.offsetWidth;e.classList.add('go');
  setTimeout(()=>e.classList.remove('go'),500);
}
function showToast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>t.classList.remove('show'),1500);
}

// ── TABS ─────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tb=>{
  tb.addEventListener('click',()=>{
    tabIdx=+tb.dataset.i;
    document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('on',i===tabIdx));
    showToast(tb.textContent.trim());
  });
});

// ── KEYBOARD ─────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key==='s'){e.preventDefault();goNext();}
  if(e.key==='ArrowUp'  ||e.key==='w'){e.preventDefault();goPrev();}
  if(e.key==='m'||e.key==='M') toggleMute();
  if(e.key==='l'||e.key==='L'){ doLike(); showToast('❤️ Liked'); }
});

// ── BOOT ─────────────────────────────────────────────────────
// No splash — load immediately on page load
buildDots();
load(0);
</script>
</body>
</html>
